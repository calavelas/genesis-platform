image:
  repository: calavelas/sample
  tag: 47e65d3
  pullPolicy: IfNotPresent

service:
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

httpRoute:
  enabled: true
  pathPrefix: /sample
  stripPrefix: true
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway-cloudflare
      namespace: gateway
  hostnames:
    - svcs.calavelas.net
