{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: case-e2e-build-dispatch-verify-route
  annotations:
    argocd.argoproj.io/ignore-healthcheck: "true"
spec:
  parentRefs:
{{ toYaml .Values.httpRoute.parentRefs | indent 4 }}
{{- if .Values.httpRoute.hostnames }}
  hostnames:
{{- range .Values.httpRoute.hostnames }}
    - {{ . | quote }}
{{- end }}
{{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.httpRoute.pathPrefix | quote }}
      backendRefs:
        - group: ""
          kind: Service
          name: case-e2e-build-dispatch-verify
          port: 80
          weight: 1
{{- end }}
