apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: miller
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/calavelas/ENDR.git
    targetRevision: main
    path: SVCS/miller/chart
    helm:
      values: |
        ingress:
          enabled: true
          host: miller.k8s.local
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
