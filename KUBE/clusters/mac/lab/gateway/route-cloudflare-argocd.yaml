apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-cloudflare-argocd
  namespace: argocd
spec:
  parentRefs:
    - name: gateway-cloudflare
      namespace: gateway
  hostnames:
    - "argocd.calavelas.net"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: argocd-server
          port: 80
