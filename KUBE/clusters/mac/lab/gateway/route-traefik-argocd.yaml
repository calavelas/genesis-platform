apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-traefik-argocd
  namespace: argocd
spec:
  parentRefs:
    - name: gateway-traefik
      namespace: gateway
      sectionName: http
    - name: gateway-traefik
      namespace: gateway
      sectionName: https
  hostnames:
    - "argocd.k8s.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: argocd-server
          port: 80
