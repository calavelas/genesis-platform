apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-cloudflare-case
  namespace: endr
spec:
  parentRefs:
    - name: gateway-cloudflare
      namespace: gateway
  hostnames:
    - "case.calavelas.net"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: case
          port: 80
