apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: murph
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/calavelas/ENDR.git
    targetRevision: main
    path: SVCS/murph/chart
  destination:
    server: https://kubernetes.default.svc
    namespace: demo2
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
