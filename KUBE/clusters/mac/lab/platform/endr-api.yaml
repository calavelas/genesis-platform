apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: endr-api
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/calavelas/ENDR.git
    targetRevision: main
    path: ENDR/charts/endr-api
  destination:
    server: https://kubernetes.default.svc
    namespace: endr
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
