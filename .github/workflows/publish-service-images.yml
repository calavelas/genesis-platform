name: publish-service-images

on:
  push:
    branches:
      - main
    paths:
      - 'SVCS/**'
      - '.github/workflows/publish-service-images.yml'
      - 'TARS/TARS.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      has_services: ${{ steps.discover.outputs.has_services }}
      count: ${{ steps.discover.outputs.count }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install script dependencies
        run: pip install pyyaml

      - name: Validate Docker Hub secrets
        run: |
          test -n "${{ secrets.DOCKERHUB_USERNAME }}" || (echo "Missing secret: DOCKERHUB_USERNAME" && exit 1)
          test -n "${{ secrets.DOCKERHUB_PASSWORD }}" || (echo "Missing secret: DOCKERHUB_PASSWORD" && exit 1)

      - name: Discover changed services
        id: discover
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python3 TARS/TARS.py discover-changed-services \
              --repo-root . \
              --all-services \
              --registry dockerhub \
              --image-owner "${{ secrets.DOCKERHUB_USERNAME }}"
          else
            python3 TARS/TARS.py discover-changed-services \
              --repo-root . \
              --before "${{ github.event.before }}" \
              --after "${{ github.sha }}" \
              --registry dockerhub \
              --image-owner "${{ secrets.DOCKERHUB_USERNAME }}"
          fi

      - name: Summary
        run: |
          echo "Services to publish: ${{ steps.discover.outputs.count }}"
          if [ -n "${{ steps.discover.outputs.skipped }}" ]; then
            echo "Skipped services:"
            echo "${{ steps.discover.outputs.skipped }}"
          fi

  publish:
    needs: discover
    if: needs.discover.result == 'success' && needs.discover.outputs.has_services == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix || '{"include":[]}') }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.repo_name }}:${{ matrix.image_tag }}
