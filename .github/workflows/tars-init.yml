name: tars-init

on:
  push:
    branches:
      - main
    paths:
      - 'ENDR.yaml'
      - 'SVCS.yaml'
      - 'TARS/**'
      - '.github/workflows/tars-init.yml'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'ENDR.yaml'
      - 'SVCS.yaml'
      - 'TARS/**'
      - '.github/workflows/tars-init.yml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  tars-reconcile:
    if: ${{ github.event_name != 'push' || github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: TARS Init
        run: |
          python -m pip install --upgrade pip
          python -m pip install fastapi pydantic pyyaml jinja2 certifi

      - name: Detect changed service source paths
        id: detect_source_services
        run: |
          set -euo pipefail

          BEFORE=""
          AFTER=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BEFORE="${{ github.event.pull_request.base.sha }}"
            AFTER="${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
          fi

          if [ -z "$AFTER" ]; then
            AFTER="$(git rev-parse HEAD)"
          fi

          if [ -z "$BEFORE" ] || [[ "$BEFORE" =~ ^0+$ ]]; then
            CHANGED_FILES="$(git diff-tree --no-commit-id --name-only -r "$AFTER")"
          else
            CHANGED_FILES="$(git diff --name-only "$BEFORE" "$AFTER")"
          fi

          SERVICES="$(printf "%s\n" "$CHANGED_FILES" | awk -F/ '$1=="SVCS" && $2!="" && $2!="examples" && ($3=="app" || $3=="src" || $3=="cmd" || $3=="internal" || $3=="pkg" || $3=="lib" || $3=="Dockerfile" || $3=="requirements.txt" || $3=="pyproject.toml" || $3=="package.json" || $3=="package-lock.json" || $3=="go.mod" || $3=="go.sum" || $3=="Cargo.toml" || $3=="Cargo.lock") { print $2 }' | sort -u | paste -sd, -)"

          COUNT=0
          if [ -n "$SERVICES" ]; then
            COUNT="$(printf "%s\n" "$SERVICES" | tr ',' '\n' | sed '/^$/d' | wc -l | tr -d ' ')"
          fi

          echo "services=$SERVICES" >> "$GITHUB_OUTPUT"
          echo "service_count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "before_sha=$BEFORE" >> "$GITHUB_OUTPUT"
          echo "after_sha=$AFTER" >> "$GITHUB_OUTPUT"

      - name: Auto-tag changed services
        id: tag_services
        if: ${{ steps.detect_source_services.outputs.services != '' }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAG_SHA="${{ github.event.pull_request.head.sha }}"
          else
            TAG_SHA="${{ github.sha }}"
          fi
          TAG_VALUE="git-${TAG_SHA:0:7}"

          python3 TARS/TARS.py update-image-tags \
            --repo-root . \
            --services "${{ steps.detect_source_services.outputs.services }}" \
            --tag "$TAG_VALUE"

      - name: SVCS Check
        id: svcs_check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python3 TARS/TARS.py svcs-check \
            --repo-root . \
            --write-worktree

      - name: TARS Summary
        run: |
          set -euo pipefail

          as_bullets() {
            local csv="$1"
            if [ -z "$csv" ]; then
              echo "- none"
              return
            fi
            printf "%s\n" "$csv" | tr ',' '\n' | sed '/^$/d' | sed 's/^/- `/' | sed 's/$/`/'
          }

          BEFORE_SHA="${{ steps.detect_source_services.outputs.before_sha }}"
          AFTER_SHA="${{ steps.detect_source_services.outputs.after_sha }}"
          if [ -z "$AFTER_SHA" ]; then
            AFTER_SHA="${{ github.sha }}"
          fi

          SOURCE_COMMIT_REF="n/a"
          if [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            SOURCE_COMMIT_REF="${BEFORE_SHA:0:7}..${AFTER_SHA:0:7}"
          elif [ -n "$AFTER_SHA" ]; then
            SOURCE_COMMIT_REF="${AFTER_SHA:0:7}"
          fi

          echo "::notice title=TARS Reconcile::changes=${{ steps.svcs_check.outputs.has_changes }}, services=${{ steps.svcs_check.outputs.changed_service_count }}, files=${{ steps.svcs_check.outputs.changed_file_count }}, commit_ref=${SOURCE_COMMIT_REF}"
          if [ -n "${{ steps.tag_services.outputs.tag }}" ]; then
            echo "::notice title=TARS Auto Tag::tag=${{ steps.tag_services.outputs.tag }}, updated=${{ steps.tag_services.outputs.updated_services || 'none' }}, missing=${{ steps.tag_services.outputs.missing_services || 'none' }}"
          fi

          {
            echo "### TARS Reconcile Summary"
            echo ""
            echo "- Changes detected: \`${{ steps.svcs_check.outputs.has_changes }}\`"
            echo "- Source commit range: \`${SOURCE_COMMIT_REF}\`"
            echo "- Trigger commit: \`${{ github.sha }}\`"
            echo "- Auto tag value: \`${{ steps.tag_services.outputs.tag || 'none' }}\`"
            echo ""
            echo "#### Source service paths changed (${{ steps.detect_source_services.outputs.service_count || '0' }})"
            as_bullets "${{ steps.detect_source_services.outputs.services }}"
            echo ""
            echo "#### Reconcile service changes (${{ steps.svcs_check.outputs.changed_service_count }})"
            echo "- Added (${{ steps.svcs_check.outputs.added_service_count }}):"
            as_bullets "${{ steps.svcs_check.outputs.added_services }}"
            echo "- Updated (${{ steps.svcs_check.outputs.updated_service_count }}):"
            as_bullets "${{ steps.svcs_check.outputs.updated_services }}"
            echo "- Removed (${{ steps.svcs_check.outputs.removed_service_count }}):"
            as_bullets "${{ steps.svcs_check.outputs.removed_services }}"
            echo ""
            echo "#### Reconcile file changes (${{ steps.svcs_check.outputs.changed_file_count }})"
            echo "- Upsert files (${{ steps.svcs_check.outputs.upsert_file_count }}):"
            as_bullets "${{ steps.svcs_check.outputs.upsert_files }}"
            echo "- Deleted files (${{ steps.svcs_check.outputs.delete_file_count }}):"
            as_bullets "${{ steps.svcs_check.outputs.deleted_files }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit generated updates to PR branch
        if: >
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          steps.svcs_check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No staged changes after svcs-check."
            exit 0
          fi
          git commit -m "TARS : Sync generated assets from SVCS.yaml"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Commit generated updates to main (push mode)
        if: >
          github.event_name == 'push' &&
          github.ref_name == 'main' &&
          github.actor != 'github-actions[bot]' &&
          steps.svcs_check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No staged changes after svcs-check."
            exit 0
          fi
          git commit -m "TARS : Sync generated assets from SVCS.yaml"
          git push origin HEAD:${{ github.ref_name }}

      - name: Fork PR cannot be auto-synced
        if: >
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name != github.repository &&
          steps.svcs_check.outputs.has_changes == 'true'
        run: |
          echo "::warning title=TARS Sync Blocked::This pull_request comes from a fork. Commit generated files manually in the PR branch."
          exit 1

      - name: Upload reconcile state
        uses: actions/upload-artifact@v4
        with:
          name: tars-svcs-state-${{ github.run_id }}
          path: ${{ steps.svcs_check.outputs.state_file }}
          if-no-files-found: error
