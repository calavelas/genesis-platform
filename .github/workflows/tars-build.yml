name: TARS - Generate and Reconcile

on:
  push:
    branches:
      - main
    paths:
      - 'ENDR.yaml'
      - 'SVCS.yaml'

permissions:
  contents: write

jobs:
  reconcile:
    name: Reconcile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install fastapi pydantic pyyaml ruamel.yaml jinja2 certifi

      - name: Prepare config compatibility for activeCluster
        id: config_compat
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import pathlib
          import yaml

          root = pathlib.Path(".")
          source = root / "ENDR.yaml"
          payload = yaml.safe_load(source.read_text(encoding="utf-8")) or {}
          cfg = payload.setdefault("config", {})

          active_cluster = cfg.get("activeCluster")
          if active_cluster:
              with open(pathlib.Path(os.environ["GITHUB_OUTPUT"]), "a", encoding="utf-8") as fh:
                  fh.write("idp_config_path=ENDR.yaml\n")
              raise SystemExit(0)

          inferred = None
          clusters = cfg.get("clusters")
          if isinstance(clusters, dict) and clusters:
              inferred = next(iter(clusters.keys()))
          if not inferred:
              envs = cfg.get("environments", {})
              if isinstance(envs, dict):
                  kube = envs.get("kubernetes", [])
                  if isinstance(kube, list) and kube:
                      first = kube[0]
                      if isinstance(first, dict):
                          inferred = first.get("name")
                      elif isinstance(first, str):
                          inferred = first

          if not inferred:
              raise SystemExit("Unable to infer config.activeCluster from ENDR.yaml")

          cfg["activeCluster"] = inferred
          compat_dir = root / ".idp" / "runtime"
          compat_dir.mkdir(parents=True, exist_ok=True)
          compat_path = compat_dir / "ENDR.ci.yaml"
          compat_path.write_text(yaml.safe_dump(payload, sort_keys=False), encoding="utf-8")

          with open(pathlib.Path(os.environ["GITHUB_OUTPUT"]), "a", encoding="utf-8") as fh:
              fh.write(f"idp_config_path={compat_path.as_posix()}\n")
          PY

      - name: Reconcile (check)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IDP_CONFIG_PATH: ${{ steps.config_compat.outputs.idp_config_path }}
        run: |
          set -euo pipefail
          python3 ENDR/TARS/TARS.py svcs-check --repo-root .

  generate:
    name: Generate
    needs:
      - reconcile
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.patch.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install fastapi pydantic pyyaml ruamel.yaml jinja2 certifi

      - name: Prepare config compatibility for activeCluster
        id: config_compat
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import pathlib
          import yaml

          root = pathlib.Path(".")
          source = root / "ENDR.yaml"
          payload = yaml.safe_load(source.read_text(encoding="utf-8")) or {}
          cfg = payload.setdefault("config", {})

          active_cluster = cfg.get("activeCluster")
          if active_cluster:
              with open(pathlib.Path(os.environ["GITHUB_OUTPUT"]), "a", encoding="utf-8") as fh:
                  fh.write("idp_config_path=ENDR.yaml\n")
              raise SystemExit(0)

          inferred = None
          clusters = cfg.get("clusters")
          if isinstance(clusters, dict) and clusters:
              inferred = next(iter(clusters.keys()))
          if not inferred:
              envs = cfg.get("environments", {})
              if isinstance(envs, dict):
                  kube = envs.get("kubernetes", [])
                  if isinstance(kube, list) and kube:
                      first = kube[0]
                      if isinstance(first, dict):
                          inferred = first.get("name")
                      elif isinstance(first, str):
                          inferred = first

          if not inferred:
              raise SystemExit("Unable to infer config.activeCluster from ENDR.yaml")

          cfg["activeCluster"] = inferred
          compat_dir = root / ".idp" / "runtime"
          compat_dir.mkdir(parents=True, exist_ok=True)
          compat_path = compat_dir / "ENDR.ci.yaml"
          compat_path.write_text(yaml.safe_dump(payload, sort_keys=False), encoding="utf-8")

          with open(pathlib.Path(os.environ["GITHUB_OUTPUT"]), "a", encoding="utf-8") as fh:
              fh.write(f"idp_config_path={compat_path.as_posix()}\n")
          PY

      - name: Generate (write worktree)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IDP_CONFIG_PATH: ${{ steps.config_compat.outputs.idp_config_path }}
        run: |
          set -euo pipefail
          python3 ENDR/TARS/TARS.py svcs-check --repo-root . --write-worktree

      - name: Create patch
        id: patch
        run: |
          set -euo pipefail
          git add -A
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            : > generated.patch
            exit 0
          fi
          git diff --cached --binary > generated.patch
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Upload generated patch
        if: ${{ steps.patch.outputs.has_changes == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: tars-generated-patch-${{ github.run_id }}
          path: generated.patch
          if-no-files-found: error

  push:
    name: Push
    needs:
      - generate
    if: needs.generate.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Download generated patch
        uses: actions/download-artifact@v4
        with:
          name: tars-generated-patch-${{ github.run_id }}
          path: .

      - name: Apply patch
        run: |
          set -euo pipefail
          git apply --index generated.patch

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --cached --quiet; then
            echo "No staged changes to commit."
            exit 0
          fi
          git commit -m "TARS : Sync generated assets from SVCS.yaml"
          git push origin HEAD:main
