name: TARS - Reconcile and Update

on:
  push:
    branches:
      - main
    paths:
      - 'ENDR.yaml'
      - 'SVCS.yaml'
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  reconcile:
    name: Reconcile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install fastapi pydantic pyyaml ruamel.yaml jinja2 certifi

      - name: Prepare config compatibility for activeCluster
        id: config_compat
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import pathlib
          import yaml

          root = pathlib.Path(".")
          source = root / "ENDR.yaml"
          payload = yaml.safe_load(source.read_text(encoding="utf-8")) or {}
          cfg = payload.setdefault("config", {})

          active_cluster = cfg.get("activeCluster")
          if active_cluster:
              with open(pathlib.Path(os.environ["GITHUB_OUTPUT"]), "a", encoding="utf-8") as fh:
                  fh.write("idp_config_path=ENDR.yaml\n")
              raise SystemExit(0)

          inferred = None
          clusters = cfg.get("clusters")
          if isinstance(clusters, dict) and clusters:
              inferred = next(iter(clusters.keys()))
          if not inferred:
              envs = cfg.get("environments", {})
              if isinstance(envs, dict):
                  kube = envs.get("kubernetes", [])
                  if isinstance(kube, list) and kube:
                      first = kube[0]
                      if isinstance(first, dict):
                          inferred = first.get("name")
                      elif isinstance(first, str):
                          inferred = first

          if not inferred:
              raise SystemExit("Unable to infer config.activeCluster from ENDR.yaml")

          cfg["activeCluster"] = inferred
          compat_dir = root / ".idp" / "runtime"
          compat_dir.mkdir(parents=True, exist_ok=True)
          compat_path = compat_dir / "ENDR.ci.yaml"
          compat_path.write_text(yaml.safe_dump(payload, sort_keys=False), encoding="utf-8")

          with open(pathlib.Path(os.environ["GITHUB_OUTPUT"]), "a", encoding="utf-8") as fh:
              fh.write(f"idp_config_path={compat_path.as_posix()}\n")
          PY

      - name: Reconcile (check)
        id: svcs_check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IDP_CONFIG_PATH: ${{ steps.config_compat.outputs.idp_config_path }}
        run: |
          set -euo pipefail
          python3 ENDR/TARS/TARS.py svcs-check --repo-root .

      - name: Reconcile summary
        run: |
          set -euo pipefail

          as_bullets_csv() {
            local csv="$1"
            local indent="${2:-}"
            if [ -z "$csv" ]; then
              echo "${indent}- none"
              return
            fi
            printf "%s\n" "$csv" | tr ',' '\n' | sed '/^$/d' | awk -v p="$indent" '{ printf "%s- `%s`\n", p, $0 }'
          }

          echo "::notice title=TARS Reconcile (check)::changes=${{ steps.svcs_check.outputs.has_changes || 'unknown' }}, services=${{ steps.svcs_check.outputs.changed_service_count || '0' }} (A:${{ steps.svcs_check.outputs.added_service_count || '0' }},U:${{ steps.svcs_check.outputs.updated_service_count || '0' }},R:${{ steps.svcs_check.outputs.removed_service_count || '0' }}), files=${{ steps.svcs_check.outputs.changed_file_count || '0' }} (upsert:${{ steps.svcs_check.outputs.upsert_file_count || '0' }},delete:${{ steps.svcs_check.outputs.delete_file_count || '0' }})"
          {
            echo "### TARS Reconcile Summary"
            echo ""
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| Mode | \`check\` |"
            echo "| Changes detected | \`${{ steps.svcs_check.outputs.has_changes || 'unknown' }}\` |"
            echo "| Changed services | \`${{ steps.svcs_check.outputs.changed_service_count || '0' }}\` |"
            echo "| Changed files | \`${{ steps.svcs_check.outputs.changed_file_count || '0' }}\` |"
            echo ""
            echo "#### Reconcile service changes (${{ steps.svcs_check.outputs.changed_service_count || '0' }})"
            echo "- Added (${{ steps.svcs_check.outputs.added_service_count || '0' }})"
            as_bullets_csv "${{ steps.svcs_check.outputs.added_services }}" "  "
            echo "- Updated (${{ steps.svcs_check.outputs.updated_service_count || '0' }})"
            as_bullets_csv "${{ steps.svcs_check.outputs.updated_services }}" "  "
            echo "- Removed (${{ steps.svcs_check.outputs.removed_service_count || '0' }})"
            as_bullets_csv "${{ steps.svcs_check.outputs.removed_services }}" "  "
            echo ""
            echo "#### Reconcile file changes (${{ steps.svcs_check.outputs.changed_file_count || '0' }})"
            echo "- Upsert files (${{ steps.svcs_check.outputs.upsert_file_count || '0' }})"
            as_bullets_csv "${{ steps.svcs_check.outputs.upsert_files }}" "  "
            echo "- Deleted files (${{ steps.svcs_check.outputs.delete_file_count || '0' }})"
            as_bullets_csv "${{ steps.svcs_check.outputs.deleted_files }}" "  "
          } >> "$GITHUB_STEP_SUMMARY"

  update:
    name: Update
    needs:
      - reconcile
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.patch.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install fastapi pydantic pyyaml ruamel.yaml jinja2 certifi

      - name: Prepare config compatibility for activeCluster
        id: config_compat
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import pathlib
          import yaml

          root = pathlib.Path(".")
          source = root / "ENDR.yaml"
          payload = yaml.safe_load(source.read_text(encoding="utf-8")) or {}
          cfg = payload.setdefault("config", {})

          active_cluster = cfg.get("activeCluster")
          if active_cluster:
              with open(pathlib.Path(os.environ["GITHUB_OUTPUT"]), "a", encoding="utf-8") as fh:
                  fh.write("idp_config_path=ENDR.yaml\n")
              raise SystemExit(0)

          inferred = None
          clusters = cfg.get("clusters")
          if isinstance(clusters, dict) and clusters:
              inferred = next(iter(clusters.keys()))
          if not inferred:
              envs = cfg.get("environments", {})
              if isinstance(envs, dict):
                  kube = envs.get("kubernetes", [])
                  if isinstance(kube, list) and kube:
                      first = kube[0]
                      if isinstance(first, dict):
                          inferred = first.get("name")
                      elif isinstance(first, str):
                          inferred = first

          if not inferred:
              raise SystemExit("Unable to infer config.activeCluster from ENDR.yaml")

          cfg["activeCluster"] = inferred
          compat_dir = root / ".idp" / "runtime"
          compat_dir.mkdir(parents=True, exist_ok=True)
          compat_path = compat_dir / "ENDR.ci.yaml"
          compat_path.write_text(yaml.safe_dump(payload, sort_keys=False), encoding="utf-8")

          with open(pathlib.Path(os.environ["GITHUB_OUTPUT"]), "a", encoding="utf-8") as fh:
              fh.write(f"idp_config_path={compat_path.as_posix()}\n")
          PY

      - name: Update worktree
        id: svcs_check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IDP_CONFIG_PATH: ${{ steps.config_compat.outputs.idp_config_path }}
        run: |
          set -euo pipefail
          python3 ENDR/TARS/TARS.py svcs-check --repo-root . --write-worktree

      - name: Create patch
        id: patch
        run: |
          set -euo pipefail
          git add -A
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            : > generated.patch
            exit 0
          fi
          git diff --cached --binary > generated.patch
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Upload generated patch
        if: ${{ steps.patch.outputs.has_changes == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: tars-generated-patch-${{ github.run_id }}
          path: generated.patch
          if-no-files-found: error

      - name: Update summary
        run: |
          set -euo pipefail

          as_bullets_csv() {
            local csv="$1"
            local indent="${2:-}"
            if [ -z "$csv" ]; then
              echo "${indent}- none"
              return
            fi
            printf "%s\n" "$csv" | tr ',' '\n' | sed '/^$/d' | awk -v p="$indent" '{ printf "%s- `%s`\n", p, $0 }'
          }

          echo "::notice title=TARS Update::changes_to_push=${{ steps.patch.outputs.has_changes || 'false' }}, services=${{ steps.svcs_check.outputs.changed_service_count || '0' }} (A:${{ steps.svcs_check.outputs.added_service_count || '0' }},U:${{ steps.svcs_check.outputs.updated_service_count || '0' }},R:${{ steps.svcs_check.outputs.removed_service_count || '0' }}), files=${{ steps.svcs_check.outputs.changed_file_count || '0' }} (upsert:${{ steps.svcs_check.outputs.upsert_file_count || '0' }},delete:${{ steps.svcs_check.outputs.delete_file_count || '0' }})"
          {
            echo "### TARS Update Summary"
            echo ""
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| Mode | \`update\` |"
            echo "| Changes detected | \`${{ steps.svcs_check.outputs.has_changes || 'unknown' }}\` |"
            echo "| Changes to push | \`${{ steps.patch.outputs.has_changes || 'false' }}\` |"
            echo "| Changed services | \`${{ steps.svcs_check.outputs.changed_service_count || '0' }}\` |"
            echo "| Changed files | \`${{ steps.svcs_check.outputs.changed_file_count || '0' }}\` |"
            echo ""
            echo "#### Reconcile service changes (${{ steps.svcs_check.outputs.changed_service_count || '0' }})"
            echo "- Added (${{ steps.svcs_check.outputs.added_service_count || '0' }})"
            as_bullets_csv "${{ steps.svcs_check.outputs.added_services }}" "  "
            echo "- Updated (${{ steps.svcs_check.outputs.updated_service_count || '0' }})"
            as_bullets_csv "${{ steps.svcs_check.outputs.updated_services }}" "  "
            echo "- Removed (${{ steps.svcs_check.outputs.removed_service_count || '0' }})"
            as_bullets_csv "${{ steps.svcs_check.outputs.removed_services }}" "  "
            echo ""
            echo "#### Reconcile file changes (${{ steps.svcs_check.outputs.changed_file_count || '0' }})"
            echo "- Upsert files (${{ steps.svcs_check.outputs.upsert_file_count || '0' }})"
            as_bullets_csv "${{ steps.svcs_check.outputs.upsert_files }}" "  "
            echo "- Deleted files (${{ steps.svcs_check.outputs.delete_file_count || '0' }})"
            as_bullets_csv "${{ steps.svcs_check.outputs.deleted_files }}" "  "
          } >> "$GITHUB_STEP_SUMMARY"

  push:
    name: Push
    needs:
      - update
    if: needs.update.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Download generated patch
        uses: actions/download-artifact@v4
        with:
          name: tars-generated-patch-${{ github.run_id }}
          path: .

      - name: Apply patch
        run: |
          set -euo pipefail
          git apply --index generated.patch

      - name: Commit and push
        id: commit_push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          CHANGED_FILES="$(git diff --cached --name-only | sed '/^$/d' || true)"
          FILE_COUNT=0
          if [ -n "$CHANGED_FILES" ]; then
            FILE_COUNT="$(printf "%s\n" "$CHANGED_FILES" | sed '/^$/d' | wc -l | tr -d ' ')"
          fi
          CHANGED_SERVICES="$(printf "%s\n" "$CHANGED_FILES" | awk -F/ '
            $1=="SVCS" && $2!="" && $2!="examples" { print $2; next }
            $1=="KUBE" && $2=="clusters" && $0 ~ /\/services\/[^/]+\.yaml$/ {
              name=$NF
              sub(/\.yaml$/, "", name)
              print name
              next
            }
          ' | sort -u | paste -sd, -)"
          SERVICE_COUNT=0
          if [ -n "$CHANGED_SERVICES" ]; then
            SERVICE_COUNT="$(printf "%s\n" "$CHANGED_SERVICES" | tr ',' '\n' | sed '/^$/d' | wc -l | tr -d ' ')"
          fi

          echo "changed_services=${CHANGED_SERVICES}" >> "$GITHUB_OUTPUT"
          echo "changed_service_count=${SERVICE_COUNT}" >> "$GITHUB_OUTPUT"
          echo "changed_file_count=${FILE_COUNT}" >> "$GITHUB_OUTPUT"
          if [ -n "$CHANGED_FILES" ]; then
            {
              echo 'changed_files<<EOF'
              printf '%s\n' "$CHANGED_FILES"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

          if git diff --cached --quiet; then
            echo "No staged changes to commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "TARS : Sync generated assets from SVCS.yaml"
          git push origin HEAD:main
          echo "pushed=true" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Push summary
        if: always()
        run: |
          set -euo pipefail
          as_bullets_csv() {
            local csv="$1"
            if [ -z "$csv" ]; then
              echo "- none"
              return
            fi
            printf "%s\n" "$csv" | tr ',' '\n' | sed '/^$/d' | awk '{ printf "- `%s`\n", $0 }'
          }

          as_bullets_lines() {
            local lines="$1"
            if [ -z "$lines" ]; then
              echo "- none"
              return
            fi
            printf "%s\n" "$lines" | sed '/^$/d' | awk '{ printf "- `%s`\n", $0 }'
          }

          PUSHED="${{ steps.commit_push.outputs.pushed || 'false' }}"
          COMMIT_SHA="${{ steps.commit_push.outputs.commit_sha || 'n/a' }}"
          SHORT_SHA="n/a"
          if [ "$COMMIT_SHA" != "n/a" ]; then
            SHORT_SHA="${COMMIT_SHA:0:7}"
          fi
          CHANGED_SERVICES="${{ steps.commit_push.outputs.changed_services }}"
          CHANGED_FILES="${{ steps.commit_push.outputs.changed_files }}"
          SERVICE_COUNT="${{ steps.commit_push.outputs.changed_service_count || '0' }}"
          FILE_COUNT="${{ steps.commit_push.outputs.changed_file_count || '0' }}"

          echo "::notice title=TARS Push::pushed=${PUSHED}, commit=${SHORT_SHA}, services=${SERVICE_COUNT}, files=${FILE_COUNT}"
          {
            echo "### TARS Push Summary"
            echo ""
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| Pushed commit | \`${PUSHED}\` |"
            echo "| Commit SHA | \`${COMMIT_SHA}\` |"
            echo "| Changed services | \`${SERVICE_COUNT}\` |"
            echo "| Changed files | \`${FILE_COUNT}\` |"
            echo ""
            echo "#### Services"
            as_bullets_csv "${CHANGED_SERVICES}"
            echo ""
            echo "#### File Changes"
            as_bullets_lines "${CHANGED_FILES}"
          } >> "$GITHUB_STEP_SUMMARY"

  trigger-svcs-build:
    name: SVCS Build
    needs:
      - reconcile
      - update
      - push
    if: >
      always() &&
      needs.reconcile.result == 'success' &&
      needs.update.result == 'success' &&
      (needs.push.result == 'success' || needs.push.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch SVCS workflow
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id: "svcs-build.yml",
              ref: "main",
            });
            core.notice("Triggered svcs-build.yml on main.");

      - name: Dispatch summary
        run: |
          set -euo pipefail
          echo "::notice title=TARS Trigger SVCS::dispatched=true"
          {
            echo "### TARS Trigger SVCS Summary"
            echo ""
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| Dispatched | \`true\` |"
            echo "| Workflow | \`svcs-build.yml\` |"
            echo "| Ref | \`main\` |"
          } >> "$GITHUB_STEP_SUMMARY"
