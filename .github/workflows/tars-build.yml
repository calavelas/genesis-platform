name: TARS - Generate and Reconcile

on:
  push:
    branches:
      - main
    paths:
      - 'ENDR.yaml'
      - 'SVCS.yaml'
      - 'ENDR/TARS/**'
      - '.github/workflows/tars-build.yml'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'ENDR.yaml'
      - 'SVCS.yaml'
      - 'ENDR/TARS/**'
      - '.github/workflows/tars-build.yml'
  workflow_dispatch:
    inputs:
      write_worktree:
        description: "Run reconcile in generate mode"
        required: false
        type: boolean
        default: false

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  TARS-Reconcile:
    name: Services Reconcile
    if: ${{ github.event_name != 'push' || github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: TARS Init
        run: |
          python -m pip install --upgrade pip
          python -m pip install fastapi pydantic pyyaml ruamel.yaml jinja2 certifi

      - name: Detect changed service source paths
        id: detect_source_services
        run: |
          set -euo pipefail

          BEFORE=""
          AFTER=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BEFORE="${{ github.event.pull_request.base.sha }}"
            AFTER="${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
          fi

          if [ -z "$AFTER" ]; then
            AFTER="$(git rev-parse HEAD)"
          fi

          if [ -z "$BEFORE" ] || [[ "$BEFORE" =~ ^0+$ ]]; then
            CHANGED_FILES="$(git diff-tree --no-commit-id --name-only -r "$AFTER")"
          else
            CHANGED_FILES="$(git diff --name-only "$BEFORE" "$AFTER")"
          fi

          SERVICES="$(printf "%s\n" "$CHANGED_FILES" | awk -F/ '$1=="SVCS" && $2!="" && $2!="examples" && ($3=="app" || $3=="src" || $3=="cmd" || $3=="internal" || $3=="pkg" || $3=="lib" || $3=="Dockerfile" || $3=="requirements.txt" || $3=="pyproject.toml" || $3=="package.json" || $3=="package-lock.json" || $3=="go.mod" || $3=="go.sum" || $3=="Cargo.toml" || $3=="Cargo.lock") { print $2 }' | sort -u | paste -sd, -)"

          COUNT=0
          if [ -n "$SERVICES" ]; then
            COUNT="$(printf "%s\n" "$SERVICES" | tr ',' '\n' | sed '/^$/d' | wc -l | tr -d ' ')"
          fi

          echo "services=$SERVICES" >> "$GITHUB_OUTPUT"
          echo "service_count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "before_sha=$BEFORE" >> "$GITHUB_OUTPUT"
          echo "after_sha=$AFTER" >> "$GITHUB_OUTPUT"

      - name: Determine reconcile mode
        id: reconcile_mode
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_name }}" = "main" ] && [ "${{ github.actor }}" != "github-actions[bot]" ]; then
            echo "write_worktree=true" >> "$GITHUB_OUTPUT"
            echo "mode=generate" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.ref_name }}" = "main" ] && [ "${{ github.event.inputs.write_worktree || 'false' }}" = "true" ]; then
            echo "write_worktree=true" >> "$GITHUB_OUTPUT"
            echo "mode=generate" >> "$GITHUB_OUTPUT"
          else
            echo "write_worktree=false" >> "$GITHUB_OUTPUT"
            echo "mode=check" >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-tag changed services
        id: tag_services
        if: ${{ steps.reconcile_mode.outputs.write_worktree == 'true' && steps.detect_source_services.outputs.services != '' }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAG_SHA="${{ github.event.pull_request.head.sha }}"
          else
            TAG_SHA="${{ github.sha }}"
          fi
          TAG_VALUE="git-${TAG_SHA:0:7}"

          python3 ENDR/TARS/TARS.py update-image-tags \
            --repo-root . \
            --services "${{ steps.detect_source_services.outputs.services }}" \
            --tag "$TAG_VALUE"

      - name: Prepare config compatibility for activeCluster
        id: config_compat
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import pathlib
          import yaml

          root = pathlib.Path(".")
          source = root / "ENDR.yaml"
          payload = yaml.safe_load(source.read_text(encoding="utf-8")) or {}
          cfg = payload.setdefault("config", {})

          active_cluster = cfg.get("activeCluster")
          if active_cluster:
              with open(pathlib.Path(os.environ["GITHUB_OUTPUT"]), "a", encoding="utf-8") as fh:
                  fh.write("idp_config_path=ENDR.yaml\n")
              raise SystemExit(0)

          inferred = None
          clusters = cfg.get("clusters")
          if isinstance(clusters, dict) and clusters:
              inferred = next(iter(clusters.keys()))
          if not inferred:
              envs = cfg.get("environments", {})
              if isinstance(envs, dict):
                  kube = envs.get("kubernetes", [])
                  if isinstance(kube, list) and kube:
                      first = kube[0]
                      if isinstance(first, dict):
                          inferred = first.get("name")
                      elif isinstance(first, str):
                          inferred = first

          if not inferred:
              raise SystemExit("Unable to infer config.activeCluster from ENDR.yaml")

          cfg["activeCluster"] = inferred
          compat_dir = root / ".idp" / "runtime"
          compat_dir.mkdir(parents=True, exist_ok=True)
          compat_path = compat_dir / "ENDR.ci.yaml"
          compat_path.write_text(yaml.safe_dump(payload, sort_keys=False), encoding="utf-8")

          with open(pathlib.Path(os.environ["GITHUB_OUTPUT"]), "a", encoding="utf-8") as fh:
              fh.write(f"idp_config_path={compat_path.as_posix()}\n")
          PY

      - name: SVCS Check
        id: svcs_check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IDP_CONFIG_PATH: ${{ steps.config_compat.outputs.idp_config_path }}
        run: |
          set -euo pipefail
          CMD="python3 ENDR/TARS/TARS.py svcs-check --repo-root ."
          if [ "${{ steps.reconcile_mode.outputs.write_worktree }}" = "true" ]; then
            CMD="$CMD --write-worktree"
          fi
          echo "Running: $CMD"
          eval "$CMD"

      - name: TARS Summary
        run: |
          set -euo pipefail

          as_bullets() {
            local csv="$1"
            local indent="${2:-}"
            if [ -z "$csv" ]; then
              echo "${indent}- none"
              return
            fi
            printf "%s\n" "$csv" | tr ',' '\n' | sed '/^$/d' | awk -v p="$indent" '{ printf "%s- `%s`\n", p, $0 }'
          }

          BEFORE_SHA="${{ steps.detect_source_services.outputs.before_sha }}"
          AFTER_SHA="${{ steps.detect_source_services.outputs.after_sha }}"
          if [ -z "$AFTER_SHA" ]; then
            AFTER_SHA="${{ github.sha }}"
          fi

          SOURCE_COMMIT_REF="n/a"
          if [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            SOURCE_COMMIT_REF="${BEFORE_SHA:0:7}..${AFTER_SHA:0:7}"
          elif [ -n "$AFTER_SHA" ]; then
            SOURCE_COMMIT_REF="${AFTER_SHA:0:7}"
          fi

          echo "::notice title=TARS Reconcile::changes=${{ steps.svcs_check.outputs.has_changes }}, services=${{ steps.svcs_check.outputs.changed_service_count }}, files=${{ steps.svcs_check.outputs.changed_file_count }}, commit_ref=${SOURCE_COMMIT_REF}"
          if [ -n "${{ steps.tag_services.outputs.tag }}" ]; then
            echo "::notice title=TARS Auto Tag::tag=${{ steps.tag_services.outputs.tag }}, updated=${{ steps.tag_services.outputs.updated_services || 'none' }}, missing=${{ steps.tag_services.outputs.missing_services || 'none' }}"
          fi

          {
            echo "### TARS : Services Reconcile Summary"
            echo ""
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| Changes detected | \`${{ steps.svcs_check.outputs.has_changes }}\` |"
            echo "| Reconcile mode | \`${{ steps.reconcile_mode.outputs.mode }}\` |"
            echo "| Source commit range | \`${SOURCE_COMMIT_REF}\` |"
            echo "| Trigger commit | \`${{ github.sha }}\` |"
            echo "| Auto tag value | \`${{ steps.tag_services.outputs.tag || 'none' }}\` |"
            echo ""
            echo "#### Source service paths changed (${{ steps.detect_source_services.outputs.service_count || '0' }})"
            as_bullets "${{ steps.detect_source_services.outputs.services }}"
            echo ""
            echo "#### Reconcile service changes (${{ steps.svcs_check.outputs.changed_service_count }})"
            echo "- Added (${{ steps.svcs_check.outputs.added_service_count }})"
            as_bullets "${{ steps.svcs_check.outputs.added_services }}" "  "
            echo "- Updated (${{ steps.svcs_check.outputs.updated_service_count }})"
            as_bullets "${{ steps.svcs_check.outputs.updated_services }}" "  "
            echo "- Removed (${{ steps.svcs_check.outputs.removed_service_count }})"
            as_bullets "${{ steps.svcs_check.outputs.removed_services }}" "  "
            echo ""
            echo "#### Reconcile file changes (${{ steps.svcs_check.outputs.changed_file_count }})"
            echo "- Upsert files (${{ steps.svcs_check.outputs.upsert_file_count }})"
            as_bullets "${{ steps.svcs_check.outputs.upsert_files }}" "  "
            echo "- Deleted files (${{ steps.svcs_check.outputs.delete_file_count }})"
            as_bullets "${{ steps.svcs_check.outputs.deleted_files }}" "  "
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit generated updates to main
        if: >
          steps.reconcile_mode.outputs.write_worktree == 'true' &&
          steps.svcs_check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No staged changes after svcs-check."
            exit 0
          fi
          git commit -m "TARS : Sync generated assets from SVCS.yaml"
          git push origin HEAD:${{ github.ref_name }}

      - name: Upload reconcile state
        uses: actions/upload-artifact@v4
        with:
          name: tars-svcs-state-${{ github.run_id }}
          path: ${{ steps.svcs_check.outputs.state_file }}
          if-no-files-found: error

  CASE-Auto-Accept:
    name: CASE Auto Accept PR
    needs:
      - TARS-Reconcile
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (
        startsWith(github.event.pull_request.head.ref, 'case/') ||
        startsWith(github.event.pull_request.head.ref, 'idp/')
      ) &&
      startsWith(github.event.pull_request.title, 'CASE : Adding service :')
    runs-on: ubuntu-latest
    steps:
      - name: Approve and merge CASE PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;

            const body = String(pr.body || "");
            if (!body.includes("Registered by IDP API.")) {
              core.notice("Skipping CASE auto-accept: PR body marker not found.");
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const changedPaths = files.map((item) => item.filename).sort();
            if (changedPaths.length !== 1 || changedPaths[0] !== "SVCS.yaml") {
              core.notice(
                `Skipping CASE auto-accept: expected SVCS.yaml-only change, got [${changedPaths.join(", ")}]`
              );
              return;
            }

            try {
              await github.rest.pulls.createReview({
                owner,
                repo,
                pull_number: pr.number,
                event: "APPROVE",
                body: "Auto-approved by CASE policy (SVCS.yaml-only change).",
              });
              core.notice(`Approved PR #${pr.number}.`);
            } catch (error) {
              core.warning(`Approval step failed: ${error.message}`);
            }

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            let latestPr = null;
            for (let attempt = 0; attempt < 8; attempt += 1) {
              const result = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pr.number,
              });
              latestPr = result.data;
              if (latestPr.mergeable !== null) {
                break;
              }
              await sleep(2000);
            }

            if (!latestPr) {
              throw new Error(`Unable to load PR state for #${pr.number}`);
            }

            if (latestPr.merged) {
              core.notice(`PR #${pr.number} is already merged.`);
              return;
            }

            try {
              await github.rest.pulls.merge({
                owner,
                repo,
                pull_number: pr.number,
                merge_method: "squash",
                sha: latestPr.head.sha,
              });
              core.notice(`Merged PR #${pr.number} via direct merge.`);
              return;
            } catch (error) {
              core.notice(`Direct merge not ready for PR #${pr.number}: ${error.message}`);
            }

            try {
              await github.graphql(
                `
                mutation EnableAutoMerge($pullRequestId: ID!, $expectedHeadOid: GitObjectID!) {
                  enablePullRequestAutoMerge(
                    input: {
                      pullRequestId: $pullRequestId
                      mergeMethod: SQUASH
                      expectedHeadOid: $expectedHeadOid
                    }
                  ) {
                    pullRequest {
                      number
                    }
                  }
                }
                `,
                {
                  pullRequestId: latestPr.node_id,
                  expectedHeadOid: latestPr.head.sha,
                }
              );
              core.notice(`Enabled auto-merge for PR #${pr.number}.`);
            } catch (error) {
              throw new Error(
                `Unable to merge PR #${pr.number}. Direct merge failed and auto-merge could not be enabled: ${error.message}`
              );
            }
