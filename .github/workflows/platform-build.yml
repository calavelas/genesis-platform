name: ENDR - Build and Deploy FE/BE

on:
  push:
    branches:
      - main
    paths:
      - 'ENDR/CASE/**'
      - 'ENDR/app/**'
      - 'ENDR/PLEX/**'
      - 'ENDR/TARS/**'
      - 'ENDR/pyproject.toml'
      - 'ENDR/PLEX/Dockerfile'
      - 'ENDR/CASE/Dockerfile'
      - 'ENDR.yaml'
      - 'SVCS.yaml'
      - '.dockerignore'
      - '.github/workflows/platform-build.yml'
  pull_request:
    paths:
      - 'ENDR/CASE/**'
      - 'ENDR/app/**'
      - 'ENDR/PLEX/**'
      - 'ENDR/TARS/**'
      - 'ENDR/pyproject.toml'
      - 'ENDR/PLEX/Dockerfile'
      - 'ENDR/CASE/Dockerfile'
      - 'ENDR.yaml'
      - 'SVCS.yaml'
      - '.dockerignore'
      - '.github/workflows/platform-build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  meta:
    name: Compute Metadata
    if: >
      github.event_name != 'push' ||
      github.actor != 'github-actions[bot]' ||
      !startsWith(github.event.head_commit.message || '', 'ENDR : Persist image tag ')
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      should_push: ${{ steps.mode.outputs.should_push }}
    steps:
      - name: Compute image tag
        id: tag
        run: |
          set -euo pipefail
          SHA="${{ github.sha }}"
          echo "tag=${SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Compute push mode
        id: mode
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "should_push=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "should_push=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_push=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-publish:
    name: Build (${{ matrix.name }})
    needs: meta
    if: needs.meta.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: plex
            image_name: plex
            context: .
            dockerfile: ENDR/PLEX/Dockerfile
          - name: case
            image_name: case
            context: ENDR/CASE
            dockerfile: ENDR/CASE/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag target
        id: image_ref
        run: |
          set -euo pipefail
          if [ "${{ needs.meta.outputs.should_push }}" = "true" ]; then
            OWNER="${{ secrets.DOCKERHUB_USERNAME }}"
            test -n "$OWNER" || (echo "Missing secret: DOCKERHUB_USERNAME" && exit 1)
          else
            OWNER="localbuild"
          fi
          echo "value=docker.io/${OWNER}/${{ matrix.image_name }}:${{ needs.meta.outputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Validate Docker Hub secrets
        if: needs.meta.outputs.should_push == 'true'
        run: |
          test -n "${{ secrets.DOCKERHUB_PASSWORD }}" || (echo "Missing secret: DOCKERHUB_PASSWORD" && exit 1)

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: needs.meta.outputs.should_push == 'true'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.meta.outputs.should_push == 'true' }}
          tags: ${{ steps.image_ref.outputs.value }}

  persist-chart-tags:
    name: Persist Chart Image Tags
    needs:
      - meta
      - build-and-publish
    if: >
      needs.meta.result == 'success' &&
      needs['build-and-publish'].result == 'success' &&
      needs.meta.outputs.should_push == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Update chart values image repositories and tags
        env:
          IMAGE_OWNER: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ needs.meta.outputs.tag }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          from pathlib import Path
          import yaml

          owner = os.environ["IMAGE_OWNER"].strip()
          tag = os.environ["IMAGE_TAG"].strip()
          charts = {
            Path("ENDR/PLEX/chart/values.yaml"): "plex",
            Path("ENDR/CASE/chart/values.yaml"): "case",
          }

          for chart_path, image_name in charts.items():
            payload = yaml.safe_load(chart_path.read_text(encoding="utf-8")) or {}
            image_cfg = payload.setdefault("image", {})
            image_cfg["repository"] = f"{owner}/{image_name}"
            image_cfg["tag"] = tag
            chart_path.write_text(yaml.safe_dump(payload, sort_keys=False), encoding="utf-8")
          PY

      - name: Commit chart tag updates
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ENDR/PLEX/chart/values.yaml ENDR/CASE/chart/values.yaml
          if git diff --cached --quiet; then
            echo "No chart updates to commit."
            exit 0
          fi
          git commit -m "ENDR : Persist image tag ${{ needs.meta.outputs.tag }} for plex/case"
          git push origin HEAD:${{ github.ref_name }}

      - name: Summary
        run: |
          {
            echo "### ENDR FE/BE image publish summary"
            echo ""
            echo "- Tag: \`${{ needs.meta.outputs.tag }}\`"
            echo "- Updated charts: \`ENDR/PLEX/chart\`, \`ENDR/CASE/chart\`"
          } >> "$GITHUB_STEP_SUMMARY"
