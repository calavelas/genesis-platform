name: SVCS - Build and Deploy

on:
  workflow_run:
    workflows:
      - TARS - Generate and Reconcile
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  services-change-discovery:
    name: Services Change Discovery
    if: >
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      has_services: ${{ steps.discover.outputs.has_services }}
      count: ${{ steps.discover.outputs.count }}
      services: ${{ steps.detect_source_services.outputs.services }}
      service_count: ${{ steps.detect_source_services.outputs.service_count }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || 'main' }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install script dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install fastapi pydantic pyyaml ruamel.yaml jinja2 certifi

      - name: Validate Docker Hub secrets
        run: |
          test -n "${{ secrets.DOCKERHUB_USERNAME }}" || (echo "Missing secret: DOCKERHUB_USERNAME" && exit 1)
          test -n "${{ secrets.DOCKERHUB_PASSWORD }}" || (echo "Missing secret: DOCKERHUB_PASSWORD" && exit 1)

      - name: Detect changed service source paths
        id: detect_source_services
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            AFTER="${{ github.event.workflow_run.head_sha }}"
          else
            AFTER="$(git rev-parse HEAD)"
          fi
          BEFORE=""
          if git rev-parse "${AFTER}^" >/dev/null 2>&1; then
            BEFORE="$(git rev-parse "${AFTER}^")"
          fi

          if [ -z "$BEFORE" ] || [[ "$BEFORE" =~ ^0+$ ]]; then
            CHANGED_FILES="$(git diff-tree --no-commit-id --name-only -r "$AFTER")"
          else
            CHANGED_FILES="$(git diff --name-only "$BEFORE" "$AFTER")"
          fi

          SERVICES="$(printf "%s\n" "$CHANGED_FILES" | awk -F/ '$1=="SVCS" && $2!="" && $2!="examples" && NF>=3 && $3!="chart" { print $2 }' | sort -u | paste -sd, -)"

          COUNT=0
          if [ -n "$SERVICES" ]; then
            COUNT="$(printf "%s\n" "$SERVICES" | tr ',' '\n' | sed '/^$/d' | wc -l | tr -d ' ')"
          fi

          echo "services=$SERVICES" >> "$GITHUB_OUTPUT"
          echo "service_count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "before_sha=$BEFORE" >> "$GITHUB_OUTPUT"
          echo "after_sha=$AFTER" >> "$GITHUB_OUTPUT"

      - name: Compute image tag
        id: tag
        run: |
          set -euo pipefail
          TAG_SHA="${{ steps.detect_source_services.outputs.after_sha }}"
          if [ -z "$TAG_SHA" ]; then
            TAG_SHA="$(git rev-parse HEAD)"
          fi
          echo "tag=${TAG_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Update tags in SVCS and regenerate manifests
        if: ${{ steps.detect_source_services.outputs.services != '' }}
        run: |
          set -euo pipefail
          python3 ENDR/TARS/TARS.py update-image-tags \
            --repo-root . \
            --services "${{ steps.detect_source_services.outputs.services }}" \
            --tag "${{ steps.tag.outputs.tag }}" \
            --allow-missing
          python3 ENDR/TARS/TARS.py svcs-check \
            --repo-root . \
            --write-worktree \
            --write-scope gitops > /tmp/tars-svcs-sync.json

      - name: Discover changed services
        id: discover
        env:
          BEFORE_SHA: ${{ steps.detect_source_services.outputs.before_sha }}
          AFTER_SHA: ${{ steps.detect_source_services.outputs.after_sha }}
          DETECTED_SERVICES: ${{ steps.detect_source_services.outputs.services }}
          DOCKERHUB_OWNER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail

          if [ -z "${{ steps.detect_source_services.outputs.services }}" ]; then
            echo '{"include":[],"skipped":[]}'
            {
              echo 'matrix={"include":[]}'
              echo 'has_services=false'
              echo 'count=0'
            } >> "$GITHUB_OUTPUT"
          else
            RAW_JSON="$(mktemp)"
            FILTERED_JSON="$(mktemp)"

            python3 ENDR/TARS/TARS.py discover-changed-services \
              --repo-root . \
              --before "${BEFORE_SHA}" \
              --after "${AFTER_SHA}" \
              --registry dockerhub \
              --image-owner "${DOCKERHUB_OWNER}" > "${RAW_JSON}"

            python3 -c 'import json, os, sys; p=json.load(sys.stdin); d={item.strip() for item in os.environ.get("DETECTED_SERVICES", "").split(",") if item.strip()}; include=[item for item in p.get("include", []) if str(item.get("service", "")).strip() in d]; skipped=p.get("skipped", []); json.dump({"include": include, "skipped": skipped}, sys.stdout)' < "${RAW_JSON}" > "${FILTERED_JSON}"

            python3 -c 'import json, sys; p=json.load(sys.stdin); print(json.dumps(p, indent=2))' < "${FILTERED_JSON}"

            MATRIX_JSON="$(python3 -c 'import json, sys; p=json.load(sys.stdin); print(json.dumps({"include": p.get("include", [])}, separators=(",", ":")))' < "${FILTERED_JSON}")"
            COUNT="$(python3 -c 'import json, sys; p=json.load(sys.stdin); print(len(p.get("include", [])))' < "${FILTERED_JSON}")"
            HAS_SERVICES="false"
            if [ "${COUNT}" -gt 0 ]; then
              HAS_SERVICES="true"
            fi

            {
              echo "matrix=${MATRIX_JSON}"
              echo "has_services=${HAS_SERVICES}"
              echo "count=${COUNT}"
            } >> "$GITHUB_OUTPUT"

            SKIPPED_LINES="$(python3 -c 'import json, sys; p=json.load(sys.stdin); print("\n".join(p.get("skipped", [])))' < "${FILTERED_JSON}")"
            if [ -n "${SKIPPED_LINES}" ]; then
              {
                echo 'skipped<<EOF'
                printf '%s\n' "${SKIPPED_LINES}"
                echo 'EOF'
              } >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Summary
        run: |
          set -euo pipefail

          as_bullets_csv() {
            local csv="$1"
            local indent="${2:-}"
            if [ -z "$csv" ]; then
              echo "${indent}- none"
              return
            fi
            printf "%s\n" "$csv" | tr ',' '\n' | sed '/^$/d' | awk -v p="$indent" '{ printf "%s- `%s`\n", p, $0 }'
          }

          as_bullets_lines() {
            local lines="$1"
            local indent="${2:-}"
            if [ -z "$lines" ]; then
              echo "${indent}- none"
              return
            fi
            printf "%s\n" "$lines" | sed '/^$/d' | awk -v p="$indent" '{ printf "%s- `%s`\n", p, $0 }'
          }

          MATRIX_JSON='${{ steps.discover.outputs.matrix }}'
          PUBLISH_SERVICES="$(MATRIX_JSON="$MATRIX_JSON" python3 -c 'import json, os; raw=os.environ.get("MATRIX_JSON", "").strip(); payload=json.loads(raw) if raw else {}; names=[str(item.get("service", "")).strip() for item in payload.get("include", []) if isinstance(item, dict) and str(item.get("service", "")).strip()]; print(",".join(names))' 2>/dev/null || true)"
          SKIPPED_SERVICES="${{ steps.discover.outputs.skipped }}"

          echo "::notice title=SVCS Source Services::${{ steps.detect_source_services.outputs.services || 'none' }}"
          echo "::notice title=SVCS Publish Tag::${{ steps.tag.outputs.tag }}"
          echo "Services to publish: ${{ steps.discover.outputs.count }}"
          if [ -n "$SKIPPED_SERVICES" ]; then
            echo "Skipped services:"
            echo "$SKIPPED_SERVICES"
          fi
          {
            echo "### Services Changes Discovery Summary"
            echo ""
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| Source services changed | \`${{ steps.detect_source_services.outputs.service_count || '0' }}\` |"
            echo "| Publish tag | \`${{ steps.tag.outputs.tag }}\` |"
            echo "| Services to publish | \`${{ steps.discover.outputs.count }}\` |"
            echo "| Has publishable services | \`${{ steps.discover.outputs.has_services || 'false' }}\` |"
            echo ""
            echo "#### Source service paths changed (${{ steps.detect_source_services.outputs.service_count || '0' }})"
            as_bullets_csv "${{ steps.detect_source_services.outputs.services }}"
            echo ""
            echo "#### Services Publish Discovery"
            echo "- Selected for image publish (${{ steps.discover.outputs.count }})"
            as_bullets_csv "$PUBLISH_SERVICES" "  "
            echo "- Skipped services (with reason)"
            as_bullets_lines "$SKIPPED_SERVICES" "  "
          } >> "$GITHUB_STEP_SUMMARY"

  build-and-push:
    name: Build and Push (${{ matrix.service }})
    needs: services-change-discovery
    if: needs['services-change-discovery'].result == 'success' && needs['services-change-discovery'].outputs.has_services == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs['services-change-discovery'].outputs.matrix || '{"include":[]}') }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.repo_name }}:${{ matrix.image_tag }}

  update-image-tag:
    name: Update Image Tag
    needs:
      - services-change-discovery
      - build-and-push
    if: >
      needs['services-change-discovery'].result == 'success' &&
      needs['services-change-discovery'].outputs.has_services == 'true' &&
      needs['services-change-discovery'].outputs.services != '' &&
      needs['build-and-push'].result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install script dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install fastapi pydantic pyyaml ruamel.yaml jinja2 certifi

      - name: Apply publish tag to config
        run: |
          set -euo pipefail
          python3 ENDR/TARS/TARS.py update-image-tags \
            --repo-root . \
            --services "${{ needs['services-change-discovery'].outputs.services }}" \
            --tag "${{ needs['services-change-discovery'].outputs.tag }}" \
            --allow-missing
          python3 ENDR/TARS/TARS.py svcs-check \
            --repo-root . \
            --write-worktree \
            --write-scope gitops > /tmp/tars-svcs-sync.json

      - name: Commit tag updates
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No tag updates to commit."
            exit 0
          fi
          git commit -m "TARS : Persist image tag ${{ needs['services-change-discovery'].outputs.tag }} for ${{ needs['services-change-discovery'].outputs.service_count }} service(s)"
          git push origin HEAD:main

      - name: Summary
        run: |
          echo "::notice title=SVCS Tag Persisted::tag=${{ needs['services-change-discovery'].outputs.tag }}, services=${{ needs['services-change-discovery'].outputs.services }}"
