name: svcs-tagged

on:
  push:
    tags:
      - '*.V*.*.*'

permissions:
  contents: read

jobs:
  build-tagged-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Hub secrets
        run: |
          test -n "${{ secrets.DOCKERHUB_USERNAME }}" || (echo "Missing secret: DOCKERHUB_USERNAME" && exit 1)
          test -n "${{ secrets.DOCKERHUB_PASSWORD }}" || (echo "Missing secret: DOCKERHUB_PASSWORD" && exit 1)

      - name: Parse service and version from tag
        id: parse_tag
        run: |
          set -euo pipefail

          TAG_NAME="${GITHUB_REF_NAME}"
          if [[ "$TAG_NAME" =~ ^([a-z0-9][a-z0-9-]*)\.(V[0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            SERVICE_NAME="${BASH_REMATCH[1]}"
            VERSION_TAG="${BASH_REMATCH[2]}"
          else
            echo "::error title=Invalid tag format::Tag '$TAG_NAME' must match servicename.Vx.x.x"
            exit 1
          fi

          CONTEXT_DIR="SVCS/${SERVICE_NAME}"
          DOCKERFILE_PATH="${CONTEXT_DIR}/Dockerfile"

          if [ ! -d "$CONTEXT_DIR" ]; then
            echo "::error title=Missing service directory::${CONTEXT_DIR} does not exist"
            exit 1
          fi
          if [ ! -f "$DOCKERFILE_PATH" ]; then
            echo "::error title=Missing Dockerfile::${DOCKERFILE_PATH} does not exist"
            exit 1
          fi

          echo "service=${SERVICE_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          echo "context=${CONTEXT_DIR}" >> "$GITHUB_OUTPUT"
          echo "dockerfile=${DOCKERFILE_PATH}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push tagged image
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.parse_tag.outputs.context }}
          file: ${{ steps.parse_tag.outputs.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ steps.parse_tag.outputs.service }}:${{ steps.parse_tag.outputs.version }}

      - name: Summary
        run: |
          echo "::notice title=SVCS Tagged Build::service=${{ steps.parse_tag.outputs.service }}, version=${{ steps.parse_tag.outputs.version }}"
          {
            echo "### SVCS Tagged Build"
            echo ""
            echo "- Tag: \`${GITHUB_REF_NAME}\`"
            echo "- Service: \`${{ steps.parse_tag.outputs.service }}\`"
            echo "- Version: \`${{ steps.parse_tag.outputs.version }}\`"
            echo "- Image: \`docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ steps.parse_tag.outputs.service }}:${{ steps.parse_tag.outputs.version }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
