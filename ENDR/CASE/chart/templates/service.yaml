apiVersion: v1
kind: Service
metadata:
  name: case
  labels:
    app.kubernetes.io/name: case
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: case
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
