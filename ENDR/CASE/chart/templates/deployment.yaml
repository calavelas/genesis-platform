apiVersion: apps/v1
kind: Deployment
metadata:
  name: case
  labels:
    app.kubernetes.io/name: case
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: case
  template:
    metadata:
      labels:
        app.kubernetes.io/name: case
    spec:
      containers:
        - name: case
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          env:
{{- range $name, $value := .Values.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
{{- end }}
          readinessProbe:
            httpGet:
              path: /
              port: http
          livenessProbe:
            httpGet:
              path: /
              port: http
          resources:
{{ toYaml .Values.resources | indent 12 }}
