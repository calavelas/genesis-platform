projectName: endr
owners:
  - calavelas

config:
  git:
    provider: github
    owner: calavelas
    repo: ENDR
    defaultBranch: main
  cluster:
    name: genesis-local
    namespaceDefault: default
    argocdNamespace: argocd
    gitopsClusterDir: mac/lab
    gitopsAppsDir: services
    gitopsRootAppDir: core
  clusters:
    local:
      name: genesis-local
      namespaceDefault: default
      argocdNamespace: argocd
      gitopsClusterDir: mac/lab
      gitopsAppsDir: services
      gitopsRootAppDir: core
    gcp-dev:
      name: gcp-dev
      namespaceDefault: default
      argocdNamespace: argocd
      gitopsClusterDir: gcp/dev
      gitopsAppsDir: services
      gitopsRootAppDir: core
  environments:
    - local
    - gcp-dev

templates:
  extends: []
  service:
    - name: python-fastapi
      type: service
      description: FastAPI service template
      path: TARS/templates/service/python-fastapi
  gitops:
    - name: helm-service
      type: gitops
      description: Helm chart and ArgoCD app template
      path: TARS/templates/gitops/helm-service
