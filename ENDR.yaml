projectName: endr
owners:
  - calavelas
config:
  git:
    provider: github
    owner: calavelas
    repo: ENDR
    defaultBranch: main
  clusters:
    mac-lab:
      name: mac-lab
templates:
  extends: []
  service:
    - name: python-fastapi
      type: service
      description: FastAPI service template
      path: ENDR/TARS/templates/service/python-fastapi
  gitops:
    - name: helm-service
      type: gitops
      description: Helm chart and ArgoCD app template
      path: ENDR/TARS/templates/gitops/helm-service
