services:
- name: hello-service
  namespace: demo
  deployTo:
  - local
  generator:
    service:
      template: python-fastapi
    gitops:
      template: helm-service
  overrides:
    image: calavelas/hello-service:0.1.0
    port: 8080
    env:
      LOG_LEVEL: info
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
    ingress:
      enabled: false
      host: hello.local