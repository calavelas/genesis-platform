services:
- name: miller
  namespace: demo
  deployTo:
  - mac-lab
  generator:
    service:
      template: python-fastapi
    gitops:
      template: helm-service
- name: test
  namespace: default
  deployTo:
  - mac-lab
  generator:
    service:
      template: python-fastapi
    gitops:
      template: helm-service
  overrides:
    port: 8080
    env: {}
    ingress:
      enabled: true
      host: test.svcs.calavelas.net
- name: test2
  namespace: default
  deployTo:
  - mac-lab
  generator:
    service:
      template: python-fastapi
    gitops:
      template: helm-service
  overrides:
    port: 8080
    env: {}
    ingress:
      enabled: true
      host: test2.svcs.calavelas.net
- name: test3
  namespace: demo2
  environments:
  - mac-lab
  generator:
    service:
      template: python-fastapi
    gitops:
      template: helm-service2
  overrides:
    gateway:
      enabled: true
